<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"/>
<title>PlaceAR · WebXR</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#F59064;--secondary:#284F75;--lg:#F0F0F0;--lg2:#F7F7F7;
  --dg:#6E6E6E;--hint:#474747;--grey:#AAAAAA;--green:#52B46B;
  --red:#DD5050;--white:#ffffff;--font:'Montserrat',sans-serif;
  --r-sm:8px;--r-md:14px;--r-lg:22px;--r-xl:32px;
  --shadow:0 8px 40px rgba(40,79,117,0.18);
}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:var(--font)}
#threeCanvas{position:fixed;inset:0;width:100%;height:100%;z-index:0}

/* TOP BAR */
#topBar{position:fixed;top:0;left:0;right:0;z-index:20;display:none;align-items:center;justify-content:space-between;padding:14px 18px 10px;background:linear-gradient(to bottom,rgba(0,0,0,.65),transparent);pointer-events:none}
#topBar>*{pointer-events:auto}
#appLogoText{font-size:16px;font-weight:700;color:#fff}
#topRight{display:flex;align-items:center;gap:8px}
.topPill{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:99px;font-size:10px;font-weight:600;backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.15);color:#fff;background:rgba(17,17,17,.5)}
.topPill-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:pulse .9s infinite}
#placedBadge{display:none;align-items:center;gap:5px;padding:4px 11px;border-radius:20px;background:rgba(245,144,100,.18);border:1px solid rgba(245,144,100,.4);font-size:10px;font-weight:700;color:var(--primary)}
#placedBadge.visible{display:flex}

/* STATUS */
#statusToast{position:fixed;top:68px;left:50%;transform:translateX(-50%);z-index:19;display:none;align-items:center;gap:7px;padding:7px 16px;border-radius:99px;font-size:11px;font-weight:500;color:rgba(255,255,255,.9);background:rgba(17,17,17,.78);backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.1);white-space:nowrap;max-width:92vw}
#statusDot{width:6px;height:6px;border-radius:50%;background:var(--grey);flex-shrink:0}
#statusToast.ok #statusDot{background:var(--green)}
#statusToast.scanning #statusDot{background:var(--primary);animation:pulse .8s infinite}
#statusToast.error #statusDot{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes spin{to{transform:rotate(360deg)}}

/* GLB LOADER */
#glbLoader{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;flex-direction:column;gap:14px}
#glbLoader.visible{display:flex}
.spin{width:34px;height:34px;border:3px solid rgba(245,144,100,.25);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite}
#glbLoader p{color:rgba(255,255,255,.8);font-size:12px;font-weight:500}

/* ACTION BAR */
#actionBar{position:fixed;bottom:0;left:0;right:0;z-index:25;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1)}
#actionBar.visible{transform:translateY(0)}
#actionBarInner{margin:0 12px 12px;background:var(--white);border-radius:var(--r-lg);padding:12px 14px;display:flex;align-items:center;gap:8px;box-shadow:var(--shadow);flex-wrap:wrap}
.aBtn{flex:1;min-width:42px;display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 5px;border-radius:var(--r-md);border:none;cursor:pointer;font-family:var(--font);font-size:8px;font-weight:600;color:var(--hint);background:var(--lg2);transition:all .2s;text-transform:uppercase}
.aBtn:active{transform:scale(.93)}
.aBtn svg{width:17px;height:17px;stroke:var(--dg);fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
.aBtn.delete{color:var(--red)}.aBtn.delete svg{stroke:var(--red)}
.aBtn.confirm{background:var(--secondary);color:#fff}.aBtn.confirm svg{stroke:#fff}
#selectedProductName{font-size:11px;font-weight:700;color:var(--secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:90px;flex-shrink:0}

/* BOTTOM SHEET */
#sheet{position:fixed;bottom:0;left:0;right:0;z-index:30;background:var(--white);border-radius:var(--r-lg) var(--r-lg) 0 0;box-shadow:var(--shadow);display:none;flex-direction:column;transition:height .35s cubic-bezier(.32,.72,0,1)}
#sheetHandle{width:100%;padding:12px 0 6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:grab}
#handleBar{width:38px;height:4px;border-radius:3px;background:var(--lg)}
#quickRow{display:flex;align-items:center;gap:6px;padding:0 12px 10px;flex-shrink:0}
.qBtn{flex:1;display:flex;align-items:center;justify-content:center;gap:5px;padding:11px 6px;border-radius:var(--r-md);border:none;cursor:pointer;font-family:var(--font);font-size:11px;font-weight:700;transition:all .18s;white-space:nowrap;min-width:0}
.qBtn:active{transform:scale(.96)}
.qBtn-primary{background:var(--secondary);color:#fff}
.qBtn-ghost{background:var(--lg2);color:var(--hint)}
.qBtn-danger{background:rgba(221,80,80,.12);color:var(--red)}
.qBtn-armed{background:rgba(245,144,100,.2);color:var(--primary);border:2px solid var(--primary)}

#sheetContent{flex:1;overflow-y:auto;padding:0 14px 28px;-webkit-overflow-scrolling:touch;scrollbar-width:none;min-height:0}
#sheetContent::-webkit-scrollbar{display:none}
#sheet.collapsed #sheetContent{overflow:hidden;opacity:0;pointer-events:none}

.secLabel{font-size:9px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;color:var(--grey);margin:12px 0 8px;display:flex;align-items:center;gap:7px}
.secLabel::after{content:'';flex:1;height:1px;background:var(--lg)}

/* CATEGORY TABS */
#catTabs{display:flex;gap:6px;overflow-x:auto;padding:4px 0 10px;scrollbar-width:none}
#catTabs::-webkit-scrollbar{display:none}
.catTab{flex-shrink:0;padding:7px 14px;border-radius:99px;font-size:10px;font-weight:700;text-transform:uppercase;border:1.5px solid var(--lg);background:var(--lg2);color:var(--grey);cursor:pointer;transition:all .2s}
.catTab.active{background:var(--secondary);color:#fff;border-color:var(--secondary)}

/* PRODUCT CARDS */
#productScroll{display:flex;gap:10px;overflow-x:auto;padding-bottom:6px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
#productScroll::-webkit-scrollbar{display:none}
.prodCard{flex-shrink:0;width:120px;border-radius:var(--r-md);border:1.5px solid var(--lg);background:var(--lg2);cursor:pointer;overflow:hidden;transition:all .2s;position:relative}
.prodCard:active{transform:scale(.95)}
.prodCard.active{border-color:var(--primary);box-shadow:0 0 0 3px rgba(245,144,100,.2)}
.prodCard-img{width:100%;height:68px;object-fit:cover;display:block;background:#dde3ec}
.prodCard-body{padding:6px 8px 8px}
.prodCard-name{font-size:9px;font-weight:700;color:var(--hint);overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.prodCard-sub{font-size:8px;color:var(--grey);margin-top:1px}
.prodCard-badge{position:absolute;top:5px;right:5px;background:rgba(40,79,117,.88);color:#fff;font-size:7px;font-weight:700;padding:2px 6px;border-radius:10px}

/* SLIDERS */
input[type=range]{-webkit-appearance:none;width:100%;height:4px;background:var(--lg);border-radius:3px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--secondary);cursor:pointer;border:2px solid #fff}
.sliderHead{display:flex;justify-content:space-between;align-items:center;font-size:10px;font-weight:600;color:var(--dg);margin-bottom:4px}
.sliderHead .val{background:var(--lg2);border-radius:var(--r-sm);padding:2px 7px;font-size:10px;font-weight:700;color:var(--secondary)}
#controlsGrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:4px}

/* START SCREEN */
#startScreen{position:fixed;inset:0;z-index:100;background:linear-gradient(135deg,#0a0f1a,#1a2a3a);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;text-align:center}
#startScreen.hidden{display:none}
.startIcon{width:80px;height:80px;border-radius:28px;background:rgba(245,144,100,.15);border:1px solid rgba(245,144,100,.3);display:flex;align-items:center;justify-content:center;margin:0 auto 22px}
.startTitle{font-size:32px;font-weight:700;color:#fff;letter-spacing:-1px;margin-bottom:10px}
.startSub{font-size:13px;color:rgba(255,255,255,.6);line-height:1.7;max-width:280px;margin:0 auto 28px}
#startArBtn{padding:16px 40px;background:var(--primary);color:#fff;border:none;border-radius:99px;font-family:var(--font);font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 6px 24px rgba(245,144,100,.4);width:100%;max-width:280px}
#startArBtn:disabled{opacity:.5;cursor:not-allowed}
#xrStatusMsg{color:rgba(255,255,255,.55);font-size:12px;margin-top:12px}

/* XR RETICLE (2D overlay) */
#xrReticle{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:5;pointer-events:none;opacity:0;transition:opacity .4s}
#xrReticle.visible{opacity:1}

/* SAVE TOAST */
#saveToast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:200;display:flex;flex-direction:column;align-items:center;gap:10px;padding:24px 32px;background:rgba(20,30,40,.92);backdrop-filter:blur(20px);border-radius:var(--r-lg);border:1px solid rgba(255,255,255,.15);color:#fff;font-size:13px;font-weight:600;pointer-events:none;opacity:0;transition:opacity .3s}
#saveToast.show{opacity:1}

/* DEBUG OVERLAY */
#debugOverlay{position:fixed;top:70px;right:10px;z-index:200;background:rgba(0,0,0,.7);color:#0f0;font-size:9px;padding:6px 8px;border-radius:6px;font-family:monospace;max-width:200px;display:none}
</style>
</head>

<!-- BOTTOM SHEET -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
/* ═══════════════════════════════════════
   DEBUG HELPER
═══════════════════════════════════════ */
const dbg = document.getElementById('debugOverlay');
// Set to true to show debug overlay
const DEBUG = new URLSearchParams(location.search).has('debug');
if (DEBUG) dbg.style.display = 'block';
function log(msg) {
  console.log('[AR]', msg);
  if (DEBUG) dbg.textContent = msg;
}

/* ═══════════════════════════════════════
   STATE
═══════════════════════════════════════ */
const S = {
  xrMode: false,
  fallbackMode: false,
  catalog: [],
  selectedProductId: null,
  pendingPlace: false,      // ← armed = next tap places the object
  placedObjects: [],
  selectedObjectId: null,
  scaleMultiplier: 1.0,
  opacity: 0.9,
  meshIdCounter: 0,
  xrSession: null,
  hitTestSource: null,
  xrRefSpace: null,
  reticleHit: null,         // current XR hit pose
  touchStartDist: null,
  touchStartScale: 1,
};

/* ═══════════════════════════════════════
   DOM
═══════════════════════════════════════ */
const threeCanvas   = document.getElementById('threeCanvas');
const startScreen   = document.getElementById('startScreen');
const startArBtn    = document.getElementById('startArBtn');
const xrStatusMsg   = document.getElementById('xrStatusMsg');
const topBar        = document.getElementById('topBar');
const sheet         = document.getElementById('sheet');
const statusToast   = document.getElementById('statusToast');
const statusText    = document.getElementById('statusText');
const placedBadge   = document.getElementById('placedBadge');
const placedCountEl = document.getElementById('placedCountEl');
const actionBar     = document.getElementById('actionBar');
const selProdName   = document.getElementById('selectedProductName');
const xrReticle     = document.getElementById('xrReticle');
const glbLoader     = document.getElementById('glbLoader');
const glbLoaderText = document.getElementById('glbLoaderText');
const productScroll = document.getElementById('productScroll');
const catTabs       = document.getElementById('catTabs');
const placeBtn      = document.getElementById('placeBtn');

function setStatus(msg, cls = '') {
  statusText.textContent = msg;
  statusToast.className = cls;
  statusToast.style.display = 'flex';
}

/* ═══════════════════════════════════════
   THREE.JS INIT
═══════════════════════════════════════ */
let scene, camera3, renderer3, loader;
let xrReticleMesh;

function initThree() {
  scene = new THREE.Scene();
  camera3 = new THREE.PerspectiveCamera(70, innerWidth / innerHeight, 0.01, 100);

  renderer3 = new THREE.WebGLRenderer({ canvas: threeCanvas, alpha: true, antialias: true });
  renderer3.setSize(innerWidth, innerHeight);
  renderer3.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer3.outputEncoding = THREE.sRGBEncoding;
  renderer3.physicallyCorrectLights = true;
  renderer3.shadowMap.enabled = true;
  renderer3.xr.enabled = true;  // MUST be true for WebXR

  // Lights
  scene.add(new THREE.AmbientLight(0xffffff, 1.4));
  const dir = new THREE.DirectionalLight(0xffffff, 1.6);
  dir.position.set(3, 8, 5);
  dir.castShadow = true;
  scene.add(dir);
  scene.add(Object.assign(new THREE.DirectionalLight(0xffffff, 0.5), { position: { x: -4, y: 2, z: -4 } }));

  // 3D reticle ring shown in world-space
  const ring = new THREE.RingGeometry(0.10, 0.14, 32).rotateX(-Math.PI / 2);
  xrReticleMesh = new THREE.Mesh(ring, new THREE.MeshBasicMaterial({ color: 0xF59064, side: THREE.DoubleSide }));
  xrReticleMesh.visible = false;
  xrReticleMesh.matrixAutoUpdate = false;
  scene.add(xrReticleMesh);

  loader = new THREE.GLTFLoader();

  window.addEventListener('resize', () => {
    camera3.aspect = innerWidth / innerHeight;
    camera3.updateProjectionMatrix();
    renderer3.setSize(innerWidth, innerHeight);
  });
}

/* ═══════════════════════════════════════
   WEBXR SESSION
═══════════════════════════════════════ */
async function tryStartXR() {
  startArBtn.disabled = true;
  startArBtn.textContent = '⏳ Démarrage…';

  // Check support
  if (!navigator.xr) {
    xrStatusMsg.textContent = 'WebXR non disponible → mode caméra';
    await startFallback();
    return;
  }
  const supported = await navigator.xr.isSessionSupported('immersive-ar').catch(() => false);
  if (!supported) {
    xrStatusMsg.textContent = 'AR non supportée sur cet appareil → mode caméra';
    await startFallback();
    return;
  }

  try {
    const session = await navigator.xr.requestSession('immersive-ar', {
      requiredFeatures: ['hit-test'],
      optionalFeatures: ['dom-overlay', 'anchors'],
      domOverlay: { root: document.body },
    });

    S.xrSession = session;
    S.xrMode = true;

    renderer3.xr.setReferenceSpaceType('local');
    await renderer3.xr.setSession(session);

    // Reference spaces
    S.xrRefSpace = await session.requestReferenceSpace('local');
    const viewerSpace = await session.requestReferenceSpace('viewer');
    S.hitTestSource = await session.requestHitTestSource({ space: viewerSpace });

    session.addEventListener('end', () => {
      S.xrMode = false;
      S.xrSession = null;
      S.hitTestSource = null;
      renderer3.setAnimationLoop(null);
    });

    // ── XR SELECT = tap in AR ──────────────────────────────
    session.addEventListener('select', onXRSelect);

    // Start XR render loop
    renderer3.setAnimationLoop(xrLoop);

    showARUI();
    setStatus('Pointez le sol → tapez "Placer ici" puis tapez l\'écran', 'scanning');
    log('XR session started');

  } catch (err) {
    log('XR error: ' + err);
    xrStatusMsg.textContent = 'Erreur XR: ' + err.message;
    await startFallback();
  }
}

/* ── XR select event (tap on screen in AR) ── */
function onXRSelect() {
  log('XR select — pendingPlace=' + S.pendingPlace + ' reticleHit=' + !!S.reticleHit);

  if (S.pendingPlace && S.selectedProductId && S.reticleHit) {
    // Extract position from reticle matrix
    const mat = new THREE.Matrix4().fromArray(S.reticleHit);
    const pos = new THREE.Vector3();
    const quat = new THREE.Quaternion();
    const scl = new THREE.Vector3();
    mat.decompose(pos, quat, scl);

    placeAt(pos, quat);
    S.pendingPlace = false;
    armPlaceBtn(false);
    setStatus('Produit placé ✓  — Tapez à nouveau pour en ajouter', 'ok');
  } else if (!S.pendingPlace) {
    // No product armed — just deselect
    deselectObject();
  }
}

/* ── XR render loop ── */
function xrLoop(time, frame) {
  if (!frame) return;

  // Hit-test
  if (S.hitTestSource) {
    const results = frame.getHitTestResults(S.hitTestSource);
    if (results.length > 0) {
      const hit = results[0];
      const pose = hit.getPose(S.xrRefSpace);
      if (pose) {
        xrReticleMesh.visible = true;
        xrReticleMesh.matrix.fromArray(pose.transform.matrix);
        S.reticleHit = pose.transform.matrix;  // save for onXRSelect
        xrReticle.classList.add('visible');
      }
    } else {
      xrReticle.classList.remove('visible');
      S.reticleHit = null;
    }
  }

  renderer3.render(scene, camera3);
}

/* ═══════════════════════════════════════
   FALLBACK MODE (no WebXR)
═══════════════════════════════════════ */
async function startFallback() {
  S.fallbackMode = true;

  // Camera video
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false,
    });
    const vid = document.createElement('video');
    vid.srcObject = stream;
    vid.autoplay = true;
    vid.playsInline = true;
    vid.muted = true;
    vid.style.cssText = 'position:fixed;inset:0;width:100%;height:100%;object-fit:cover;z-index:0';
    document.body.insertBefore(vid, document.body.firstChild);
    await vid.play();
  } catch (e) {
    log('Camera error: ' + e);
  }

  // Floor for raycasting
  camera3.position.set(0, 1.2, 0);
  camera3.lookAt(0, 0, -2);
  const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(20, 20),
    new THREE.MeshBasicMaterial({ visible: false, side: THREE.DoubleSide })
  );
  floor.rotation.x = -Math.PI / 2;
  floor.name = 'floor';
  scene.add(floor);

  renderer3.setAnimationLoop(() => renderer3.render(scene, camera3));

  // Tap = place (fallback)
  threeCanvas.addEventListener('click', (e) => {
    const sh = sheet.getBoundingClientRect();
    if (e.clientY > sh.top) return;
    if (S.pendingPlace && S.selectedProductId) {
      const pos = fallbackRaycast(e.clientX, e.clientY);
      if (pos) {
        placeAt(pos, null);
        S.pendingPlace = false;
        armPlaceBtn(false);
        setStatus('Placé ✓', 'ok');
      }
    } else {
      deselectObject();
    }
  });

  showARUI();
  setStatus('Mode caméra (WebXR non dispo) — Sélectionnez un produit', 'ok');
  log('Fallback mode started');
}

function fallbackRaycast(sx, sy) {
  const rc = new THREE.Raycaster();
  const nx = (sx / innerWidth) * 2 - 1;
  const ny = -(sy / innerHeight) * 2 + 1;
  rc.setFromCamera({ x: nx, y: ny }, camera3);
  const fl = scene.getObjectByName('floor');
  if (!fl) return new THREE.Vector3(nx * 1.5, 0, -2);
  const hits = rc.intersectObject(fl);
  return hits.length ? hits[0].point : new THREE.Vector3(nx * 1.5, 0, -2);
}

/* ═══════════════════════════════════════
   SHOW AR UI (after session starts)
═══════════════════════════════════════ */
function showARUI() {
  startScreen.classList.add('hidden');

/* ═══════════════════════════════════════
   PLACE PRODUCT AT POSITION
═══════════════════════════════════════ */
function placeAt(pos, quat) {
  const product = S.catalog.find(p => p.id === S.selectedProductId);
  if (!product) { log('No product selected!'); return; }

  log('Placing: ' + product.name + ' modelUrl=' + product.modelUrl);

  const group = new THREE.Group();
  group.position.copy(pos);
  if (quat) group.quaternion.copy(quat);
  scene.add(group);

  const id = ++S.meshIdCounter;
  group.userData.placeId = id;

  const entry = { id, group, productId: product.id, name: product.name, rotY: 0, scaleVal: S.scaleMultiplier };
  S.placedObjects.push(entry);
  updateBadge();
  selectObject(id);

  const glbUrl = (product.modelUrl || '').trim();
  if (glbUrl.length > 4 && (glbUrl.startsWith('http') || glbUrl.startsWith('/'))) {
    glbLoader.classList.add('visible');
    glbLoaderText.textContent = 'Chargement ' + product.name + '…';

    loader.load(
      glbUrl,
      (gltf) => {
        glbLoader.classList.remove('visible');
        const model = gltf.scene;

        model.traverse(c => {
          if (!c.isMesh) return;
          c.castShadow = true;
          c.receiveShadow = true;
          // Clone materials to allow per-instance opacity
          const mats = Array.isArray(c.material) ? c.material : [c.material];
          c.material = mats.map(m => {
            const mc = m.clone();
            mc.transparent = S.opacity < 1.0;
            mc.opacity = S.opacity;
            mc.needsUpdate = true;
            return mc;
          });
          if (!Array.isArray(c.material) && mats.length === 1) c.material = c.material;
        });

        // Auto-scale to ~0.6m bounding box
        const bb = new THREE.Box3().setFromObject(model);
        const size = bb.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);
        if (maxDim > 0) {
          const sc = (0.6 / maxDim) * S.scaleMultiplier;
          model.scale.setScalar(sc);
          entry.baseScale = sc;
        }

        // Center horizontally at floor level
        const bb2 = new THREE.Box3().setFromObject(model);
        const center = bb2.getCenter(new THREE.Vector3());
        const minY = bb2.min.y;
        model.position.x -= center.x;
        model.position.y -= minY;  // sit on floor
        model.position.z -= center.z;

        group.add(model);
        entry.model = model;
        log('GLB loaded OK: ' + product.name);
      },
      (prog) => {
        if (prog.total) log('Loading ' + Math.round(prog.loaded / prog.total * 100) + '%');
      },
      (err) => {
        glbLoader.classList.remove('visible');
        log('GLB error: ' + (err.message || err));
        // Fallback colored box
        const mat = new THREE.MeshStandardMaterial({ color: 0xC9A96E, transparent: true, opacity: S.opacity });
        const box = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, 0.4), mat);
        box.position.y = 0.2;
        group.add(box);
        entry.model = box;
        setStatus('⚠️ Modèle 3D introuvable — vérifiez l\'URL GLB', 'error');
      }
    );
  } else {
    log('No valid modelUrl: "' + glbUrl + '" — using fallback box');
    // Fallback colored box
    const mat = new THREE.MeshStandardMaterial({ color: 0xC9A96E, transparent: true, opacity: S.opacity });
    const box = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, 0.4), mat);
    box.position.y = 0.2;
    group.add(box);
    entry.model = box;
    setStatus('⚠️ URL du modèle 3D manquante', 'error');
  }

  postToFlutter({ type: 'placed', count: S.placedObjects.length });
}

/* ═══════════════════════════════════════
   OBJECT CONTROLS
═══════════════════════════════════════ */
function selectObject(id) {
  S.selectedObjectId = id;
  const obj = S.placedObjects.find(o => o.id === id);
  selProdName.textContent = obj ? (obj.name || 'Objet') : '—';
  actionBar.classList.add('visible');
}
function deselectObject() {
  S.selectedObjectId = null;
  actionBar.classList.remove('visible');
}
function rotateSelected(deg) {
  const obj = S.placedObjects.find(o => o.id === S.selectedObjectId);
  if (!obj) return;
  obj.rotY += deg * Math.PI / 180;
  obj.group.rotation.y = obj.rotY;
}
function scaleSelected(factor) {
  const obj = S.placedObjects.find(o => o.id === S.selectedObjectId);
  if (!obj) return;
  obj.scaleVal = Math.max(0.05, Math.min(8, obj.scaleVal * factor));
  obj.group.scale.setScalar(obj.scaleVal);
}
function deleteSelected() {
  const obj = S.placedObjects.find(o => o.id === S.selectedObjectId);
  if (!obj) return;
  scene.remove(obj.group);
  S.placedObjects = S.placedObjects.filter(o => o.id !== S.selectedObjectId);
  deselectObject();
  updateBadge();
  postToFlutter({ type: 'removed', count: S.placedObjects.length });
}
function updateAllOpacity() {
  S.placedObjects.forEach(o => {
    o.group.traverse(c => {
      if (!c.isMesh) return;
      const mats = Array.isArray(c.material) ? c.material : [c.material];
      mats.forEach(m => { m.transparent = S.opacity < 1; m.opacity = S.opacity; m.needsUpdate = true; });
    });
  });
}
function updateBadge() {
  const n = S.placedObjects.length;
  placedCountEl.textContent = n;
  placedBadge.classList.toggle('visible', n > 0);
}

/* Pinch to scale */
document.addEventListener('touchstart', e => {
  if (e.touches.length !== 2) return;
  S.touchStartDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
  const obj = S.placedObjects.find(o => o.id === S.selectedObjectId);
  S.touchStartScale = obj ? obj.scaleVal : 1;
}, { passive: true });

document.addEventListener('touchmove', e => {
  if (e.touches.length !== 2 || !S.touchStartDist) return;
  const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
  const obj = S.placedObjects.find(o => o.id === S.selectedObjectId);
  if (obj) {
    obj.scaleVal = Math.max(0.05, Math.min(8, S.touchStartScale * (d / S.touchStartDist)));
    obj.group.scale.setScalar(obj.scaleVal);
  }
}, { passive: true });

document.addEventListener('touchend', () => { S.touchStartDist = null; });

   ACTION BAR

document.getElementById('aBtnRotL').onclick = () => rotateSelected(-20);
document.getElementById('aBtnRotR').onclick = () => rotateSelected(20);

   PLACE / RESET / CAPTURE BUTTONS
═══════════════════════════════════════ */
function armPlaceBtn(armed) {
  S.pendingPlace = armed;
  if (armed) {
    placeBtn.textContent = '👆 Tapez le sol maintenant';
    placeBtn.className = 'qBtn qBtn-armed';
  } else {
    placeBtn.textContent = '⊕ Placer ici';
    placeBtn.className = 'qBtn qBtn-primary';
  }
}

placeBtn.addEventListener('click', () => {
  if (!S.selectedProductId) {
    if (S.catalog.length > 0) selectProductById(S.catalog[0].id);
    else setStatus('Aucun produit disponible', 'error');
    return;
  }

  if (S.fallbackMode) {
    // Fallback: place immediately at fixed position
    placeAt(new THREE.Vector3(0, 0, -1.5), null);
    return;
  }

  // XR mode: arm and wait for tap
  if (!S.pendingPlace) {
    armPlaceBtn(true);
    setSheetH(PEEK);
    setStatus('Tapez le sol pour placer ' + (S.catalog.find(p => p.id === S.selectedProductId)?.name || ''), 'scanning');
  } else {
    // Already armed — if reticle visible, place now
    if (S.reticleHit) {
      onXRSelect();
    } else {
      setStatus('Pointez d\'abord le sol', 'scanning');
    }
  }
});

document.getElementById('resetBtn').addEventListener('click', () => {

/* ═══════════════════════════════════════
   CATALOG
═══════════════════════════════════════ */

/**
 * POINT D'ENTRÉE PRINCIPAL DU CATALOG
 * Appelé depuis: URL params, Flutter bridge, ou mock
 */
window.loadProductCatalog = function(products) {
  log('Catalog loaded: ' + products.length + ' products');
  S.catalog = products;

  // Si l'UI AR est déjà affichée, render tout de suite
  if (!startScreen.classList.contains('hidden')) return; // UI pas encore visible, showARUI() le fera
  renderProductCards(products);
  buildCategoryTabs(products);
  setStatus(products.length + ' produit(s) chargé(s)', 'ok');
  setSheetH(MID);
};

function buildCategoryTabs(products) {
  const cats = [...new Set(products.map(p => p.category).filter(Boolean))];
  catTabs.innerHTML = '';
  const allTab = Object.assign(document.createElement('div'), { className: 'catTab active', textContent: 'Tous' });
  allTab.addEventListener('click', () => switchCat('all', allTab));
  catTabs.appendChild(allTab);
  cats.forEach(cat => {
    const tab = Object.assign(document.createElement('div'), {
      className: 'catTab',
      textContent: cat.charAt(0).toUpperCase() + cat.slice(1),
    });
    tab.addEventListener('click', () => switchCat(cat, tab));
    catTabs.appendChild(tab);
  });
}

function switchCat(cat, tabEl) {
  document.querySelectorAll('.catTab').forEach(t => t.classList.remove('active'));
  tabEl.classList.add('active');
  renderProductCards(cat === 'all' ? S.catalog : S.catalog.filter(p => p.category === cat));
}

function renderProductCards(products) {
  productScroll.innerHTML = '';
  if (!products.length) {
    productScroll.innerHTML = '<div style="padding:16px;color:var(--grey);font-size:11px">Aucun produit</div>';
    return;
  }
  products.forEach(p => {
    const card = document.createElement('div');
    card.className = 'prodCard' + (S.selectedProductId === p.id ? ' active' : '');
    card.dataset.id = p.id;
    card.innerHTML =
      '<img class="prodCard-img" src="' + esc(p.imageUrl || '') + '" onerror="this.style.background=\'#c8d0d8\'" loading="lazy">' +
      '<div class="prodCard-body">' +
        '<div class="prodCard-name">' + esc(p.name || 'Produit') + '</div>' +
        '<div class="prodCard-sub">' + esc(p.category || '') + '</div>' +
      '</div>' +
      '<div class="prodCard-badge">' + esc(p.category || '') + '</div>';
    card.addEventListener('click', () => selectProductById(p.id));
    productScroll.appendChild(card);
  });
}

function selectProductById(id) {
  S.selectedProductId = id;
  const p = S.catalog.find(p => p.id === id);
  log('Selected: ' + (p?.name || id) + ' modelUrl=' + (p?.modelUrl || 'EMPTY'));
  updateActiveCards();

  if (p) {
    if (!p.modelUrl || p.modelUrl.trim().length < 5) {
      setStatus('⚠️ ' + esc(p.name) + ' — pas de modèle 3D', 'error');
    } else {
      setStatus('Sélectionné: ' + esc(p.name) + ' → Tapez "Placer ici"', 'scanning');
    }
  }
  armPlaceBtn(false);  // reset arm state when changing product
}

function updateActiveCards() {
  document.querySelectorAll('.prodCard').forEach(c => c.classList.toggle('active', c.dataset.id === S.selectedProductId));
}

/* ═══════════════════════════════════════
   CAPTURE
═══════════════════════════════════════ */
async function doCapture() {
  const show = (icon, txt) => {
    document.getElementById('saveToastIcon').textContent = icon;
    document.getElementById('saveToastText').textContent = txt;
    const t = document.getElementById('saveToast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  };
  try {
    renderer3.render(scene, camera3);
    threeCanvas.toBlob(async blob => {
      if (!blob) return;
      const file = new File([blob], 'placeAR.png', { type: 'image/png' });
      if (navigator.canShare?.({ files: [file] })) {
        try { await navigator.share({ files: [file], title: 'PlaceAR' }); show('📸', 'Partagé !'); return; } catch {}
      }
      const a = document.createElement('a');
      a.download = 'placeAR.png';
      a.href = URL.createObjectURL(blob);
      a.click();
      setTimeout(() => URL.revokeObjectURL(a.href), 3000);
      show('💾', 'Sauvegardé !');
    }, 'image/png');
  } catch { show('❌', 'Erreur capture'); }
  postToFlutter({ type: 'capture' });
}

/* ═══════════════════════════════════════
   BOTTOM SHEET DRAG
═══════════════════════════════════════ */
const PEEK = 92, MID = 360, FULL = Math.round(innerHeight * .88);
let shY = null, shH0 = 0;

function setSheetH(h, anim = true) {
  sheet.style.transition = anim ? 'height .35s cubic-bezier(.32,.72,0,1)' : 'none';
  sheet.style.height = h + 'px';
  sheet.classList.toggle('collapsed', h <= PEEK + 10);
}
function snapSheet(h) { setSheetH(h < (PEEK + MID) / 2 ? PEEK : h < (MID + FULL) / 2 ? MID : FULL); }

const hndl = document.getElementById('sheetHandle');
hndl.addEventListener('mousedown', e => { shY = e.clientY; shH0 = sheet.getBoundingClientRect().height; sheet.style.transition = 'none'; });
hndl.addEventListener('touchstart', e => { shY = e.touches[0].clientY; shH0 = sheet.getBoundingClientRect().height; sheet.style.transition = 'none'; }, { passive: true });
window.addEventListener('mousemove', e => { if (shY == null) return; const h = Math.max(PEEK, Math.min(FULL, shH0 + (shY - e.clientY))); sheet.style.height = h + 'px'; sheet.classList.toggle('collapsed', h <= PEEK + 10); });
window.addEventListener('touchmove', e => { if (shY == null) return; const h = Math.max(PEEK, Math.min(FULL, shH0 + (shY - e.touches[0].clientY))); sheet.style.height = h + 'px'; sheet.classList.toggle('collapsed', h <= PEEK + 10); }, { passive: true });
const endDrag = () => { if (shY == null) return; snapSheet(sheet.getBoundingClientRect().height); shY = null; };
window.addEventListener('mouseup', endDrag); window.addEventListener('touchend', endDrag);
hndl.addEventListener('click', () => { const h = sheet.getBoundingClientRect().height; setSheetH(h <= PEEK + 10 ? MID : h >= FULL - 20 ? PEEK : FULL); });

/* ═══════════════════════════════════════
   FLUTTER BRIDGE
═══════════════════════════════════════ */
function postToFlutter(obj) {
  const str = JSON.stringify(obj);
  try {
    if (window.flutter_inappwebview) { window.flutter_inappwebview.callHandler('FlutterBridge', str); return; }
    if (typeof FlutterBridge !== 'undefined') { FlutterBridge.postMessage(str); return; }
    if (window.webkit?.messageHandlers?.FlutterBridge) { window.webkit.messageHandlers.FlutterBridge.postMessage(str); }
  } catch (e) { /* not in flutter */ }
}

window.receiveFromFlutter = function(jsonStr) {
  try {
    const d = JSON.parse(jsonStr);
    if (d.type === 'catalog' && d.products) window.loadProductCatalog(d.products);
    if (d.type === 'clear') { S.placedObjects.forEach(o => scene?.remove(o.group)); S.placedObjects = []; deselectObject(); updateBadge(); }
  } catch (e) { log('receiveFromFlutter error: ' + e); }
};

/* ═══════════════════════════════════════
   URL PARAMS — Flutter passes ?products=[JSON]
═══════════════════════════════════════ */
function loadFromUrl() {
  try {
    const params = new URLSearchParams(location.search);
    const raw = params.get('products');
    if (!raw) { log('No ?products param in URL'); return; }

    const arr = JSON.parse(decodeURIComponent(raw));
    log('URL products: ' + arr.length);

    // ──────────────────────────────────────────────────────
    // MAP Flutter fields → internal fields
    // Flutter sends: id, name, modelUrl, imageUrl, category
    // (from ProductModel.fromApi: image3D → modelUrl, imageCouleurs → imageUrl)
    // ──────────────────────────────────────────────────────
    const mapped = arr.map(p => ({
      id:       p.id || p._id || String(Math.random()),
      name:     p.name || 'Produit',
      modelUrl: p.modelUrl || p.model3D || p.image3D || '',  // .glb URL
      imageUrl: p.imageUrl || p.imageCouleurs || p.image || p.thumbnail || '',
      category: p.category || 'Furniture',
    }));

    // Log first product for debug
    if (mapped.length > 0) log('First product: ' + mapped[0].name + ' | modelUrl: ' + mapped[0].modelUrl.substring(0, 60));

    // Store immediately, render when UI is ready
    S.catalog = mapped;

    // If AR UI already shown (shouldn't happen but safe)
    if (startScreen.classList.contains('hidden')) {
      renderProductCards(mapped);
      buildCategoryTabs(mapped);
      setStatus(mapped.length + ' produit(s) chargé(s)', 'ok');
      setSheetH(MID);
    }
  } catch (e) {
    log('URL parse error: ' + e);
  }
}

/* ═══════════════════════════════════════
   UTILS
═══════════════════════════════════════ */
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

      log('No catalog loaded — using mock');
      window.loadProductCatalog(MOCK);
    } else {
      // Catalog was loaded from URL, now render it
      renderProductCards(S.catalog);
      buildCategoryTabs(S.catalog);
      setSheetH(MID);
    }
  }, 1500);
});
</script>
</body>
</html>
